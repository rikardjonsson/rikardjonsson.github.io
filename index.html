
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Kaloriförbränning</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: sans-serif;
      padding: 2rem;
      background: white;
    }
    canvas {
      max-width: 800px;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <h1>Daglig Kaloriförbränning</h1>
  <canvas id="burnChart" height="400"></canvas>
  <script>
    const ctx = document.getElementById('burnChart').getContext('2d');
    const burnChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Måndag', 'Tisdag', 'Onsdag', 'Torsdag', 'Fredag (vin)', 'Lördag', 'Söndag'],
            datasets: [
              {
                label: 'Träning',
                data: [450, 540, 450, 540, 450, 720, 450],
                backgroundColor: '#4f46e5'
              },
              {
                label: 'Steg',
                data: [600, 600, 600, 600, 600, 400, 400],
                backgroundColor: '#10b981'
              }
            ]
        },
        options: {
            responsive: true,
            scales: {
                y: {
                    beginAtZero: true,
                    title: {
                      display: true,
                      text: 'Kalorier'
                    }
                }
            }
        }
    });
  </script>
</body>
</html>
