<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kaloriförbränning – Veckoplan</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 2rem;
      background: #f9fafb;
      color: #111827;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
      text-align: center;
    }
    canvas {
      max-width: 800px;
      margin: 2rem auto;
      display: block;
    }
    footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.9rem;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <h1>Kaloriförbränning – Träning & Steg</h1>
  <canvas id="burnChart" height="400"></canvas>

  <script>
    const labels = ["Måndag", "Tisdag", "Onsdag", "Torsdag", "Fredag (vin)", "Lördag", "Söndag"];
    const trainingBurn = [450, 540, 450, 540, 450, 720, 450]; // i kcal
    const stepBurn = [600, 600, 600, 600, 600, 400, 400]; // i kcal

    const ctx = document.getElementById('burnChart').getContext('2d');
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [
          {
            label: 'Träning',
            data: trainingBurn,
            backgroundColor: '#4f46e5'
          },
          {
            label: 'Steg',
            data: stepBurn,
            backgroundColor: '#10b981'
          }
        ]
      },
      options: {
        responsive: true,
        plugins: {
          tooltip: {
            mode: 'index',
            intersect: false
          },
          legend: {
            position: 'bottom'
          }
        },
        scales: {
          y: {
            beginAtZero: true,
            title: {
              display: true,
              text: 'Kalorier'
            }
          }
        }
      }
    });
  </script>

  <footer>
    Du bränner ~2600–3100 kcal per dag. Disciplin varje dag gör skillnaden. 💪
  </footer>
</body>
</html>
